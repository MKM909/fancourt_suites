<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanya Visual Harness</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #17130d;
        color: #f7f0e2;
        font-family: Arial, sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 12px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(23, 19, 13, 0.92);
        backdrop-filter: blur(16px);
      }

      header strong {
        font-size: 14px;
        letter-spacing: 0;
      }

      header span {
        color: rgba(247, 240, 226, 0.7);
        font-size: 12px;
      }

      .harness-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 45px);
      }

      .pane {
        min-width: 0;
        border-right: 1px solid rgba(255, 255, 255, 0.12);
      }

      .pane:last-child {
        border-right: 0;
      }

      .pane-title {
        position: sticky;
        top: 45px;
        z-index: 5;
        padding: 8px 12px;
        background: rgba(23, 19, 13, 0.88);
        color: rgba(247, 240, 226, 0.72);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
      }

      .reference-wrap {
        display: flex;
        justify-content: center;
        padding: 0 0 32px;
        background: #e9e0cf;
      }

      .reference-wrap img {
        width: 100%;
        max-width: 633px;
        height: auto;
        display: block;
      }

      .live-scale {
        width: 100%;
        height: 2100px;
        overflow: hidden;
        background: #e9e0cf;
      }

      iframe {
        width: 1267px;
        height: 4200px;
        border: 0;
        background: #e9e0cf;
        display: block;
        transform: scale(.5);
        transform-origin: top left;
      }

      @media (max-width: 960px) {
        .harness-grid {
          grid-template-columns: 1fr;
        }

        iframe {
          width: 100%;
          height: 900px;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Exact Mockup Harness</strong>
      <span>Left: supplied reference. Right: live React/Vite build.</span>
    </header>
    <main class="harness-grid">
      <section class="pane">
        <div class="pane-title">Reference Mockup</div>
        <div class="reference-wrap">
          <img src="/vanya-reference.webp" alt="Vanya hotel mockup reference">
        </div>
      </section>
      <section class="pane">
        <div class="pane-title">Live React Build</div>
        <div class="live-scale">
          <iframe src="/" title="Live hotel template"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
